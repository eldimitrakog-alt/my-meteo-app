<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Playwrite+NZ+Basic:wght@100..400&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
    <title>MyMeteo</title>
  </head>
  <body>
    <div class="container">
      <header>
        <form id="search-form">
          <input
            type="search"
            placeholder="Enter a city.."
            required
            class="name-city"
            id="search-input"
          />
          <input type="submit" value="Search" class="search-city" />
        </form>
      </header>
      <main>
        <div class="current-weather">
          <div>
            <h1 id="current-city">Berlin</h1>
            <p class="details" id="current-date"></p>
          </div>
          <div class="current-temperature">
            <span class="current-temperature-icon">☀️</span>
            <span class="current-temperature-number current-temperature-value"
              >14</span
            >
            <span class="current-temperature-unit">°C</span>
          </div>
        </div>
        <div class="weather-forecast" id="forecast"></div>
      </main>
      <footer>
        Coded by
        <a href="https://github.com/eldimitrakog-alt" target="_blank">
          Elisavet Dimitrakogianni</a
        >, is open-sourced on
        <a
          href="https://github.com/eldimitrakog-alt/my-meteo-app/commits/main/"
          target="_blank"
        >
          GitHub</a
        >
        and web hosted on
        <a href="https://my-meteo-app-1q9k.onrender.com/" target="_blank">
          Render </a
        >.
      </footer>
    </div>
    <script src="index.js"></script>
  </body>
</html>
