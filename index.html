<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Playwrite+NZ+Basic:wght@100..400&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"/>
      <link rel="stylesheet" href="styles.css" />
      <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
    <title> MyMeteo </title>
  </head>
  <body>
    <div class="container">
      <header>
        <form id="search-form">
  <input
    type="search"
    placeholder="Enter a city.."
    required
    class="name-city"
    id="search-input"
  />
  <input type="submit" value="Search" class="search-city" />
</form>
          </header>
      <main>
        <div class="current-weather">
          <div>
            <h1 id="current-city">Berlin</h1>
          <p class="details" id="current-date">
   Saturday <strong>19:22</strong>, moderate rain <br /> 
  Humidity: <strong></strong>, Wind: <strong> km/h</strong> 
</p>
          </div>
          <div class="current-temperature">
            <span class="current-temperature-icon">☀️</span>
            <span class="current-temperature-number current-temperature-value">14</span>
            <span class="current-temperature-unit">°C</span>
          </div>
        </div>
        
          <div class="weather-forecast-day">
            <div class="weather-forecast-date">Tue</div>
            <div class="weather-forecast-icon">☁️</div>
            <div class="weather-forecast-temperatures">
              <div class="weather-forecast-temperature-max">16</div>
              <div class="weather-forecast-temperature-unit">°C</div>
              <div class="weather-forecast-temperature-min">10</div>
              <div class="weather-forecast-temperature-unit">°C</div>
            </div>
          </div>
          <div class="weather-forecast-day">
            <div class="weather-forecast-date">Wed</div>
            <div class="weather-forecast-icon">🌧️</div>
            <div class="weather-forecast-temperatures">
              <div class="weather-forecast-temperature-max">14</div>
              <div class="weather-forecast-temperature-unit">°C</div>
              <div class="weather-forecast-temperature-min">8</div>
              <div class="weather-forecast-temperature-unit">°C</div>
            </div>
          </div>
          <div class="weather-forecast-day">
            <div class="weather-forecast-date">Thu</div>
            <div class="weather-forecast-icon">⛅</div>
            <div class="weather-forecast-temperatures">
              <div class="weather-forecast-temperature-max">18</div>
              <div class="weather-forecast-temperature-unit">°C</div>
              <div class="weather-forecast-temperature-min">12</div>
              <div class="weather-forecast-temperature-unit">°C</div>
            </div>
          </div>
          <div class="weather-forecast-day">
            <div class="weather-forecast-date">Fri</div>
            <div class="weather-forecast-icon">☀️</div>
            <div class="weather-forecast-temperatures">
              <div class="weather-forecast-temperature-max">20</div>
              <div class="weather-forecast-temperature-unit">°C</div>
              <div class="weather-forecast-temperature-min">14</div>
              <div class="weather-forecast-temperature-unit">°C</div>
            </div>
          </div>
          <div class="weather-forecast-day">
            <div class="weather-forecast-date">Sat</div>
            <div class="weather-forecast-icon">🌧️</div>
            <div class="weather-forecast-temperatures">
              <div class="weather-forecast-temperature-max">16</div>
              <div class="weather-forecast-temperature-unit">°C</div>
              <div class="weather-forecast-temperature-min">10</div>
              <div class="weather-forecast-temperature-unit">°C</div>
            </div>
          </div>  
        </div>
      </main>
      <footer>
        Coded by <a href="https://github.com/eldimitrakog-alt"> Elisavet Dimitrakogianni</a>, 
        is open-sourced on <a href="https://github.com/eldimitrakog-alt/my-meteo-app/commits/main/"/>
          GitHub </a> 
         and <a href="https://my-meteo-app-1q9k.onrender.com/"/> web hosted by Render</a>.
    </footer>
    <script src="index.js"></script>
  </body>
</html>
